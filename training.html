<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Training">
  <title>Training</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #F2F2F7;
      --card: #FFFFFF;
      --primary: #FF6B35;
      --success: #34C759;
      --danger: #FF3B30;
      --blue: #007AFF;
      --text: #1C1C1E;
      --text2: #636366;
      --text3: #AEAEB2;
      --border: rgba(60,60,67,0.12);
      --radius: 13px;
      --safe-top: env(safe-area-inset-top, 44px);
      --safe-bottom: env(safe-area-inset-bottom, 20px);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1C1C1E;
        --card: #2C2C2E;
        --text: #FFFFFF;
        --text2: #AEAEB2;
        --text3: #636366;
        --border: rgba(255,255,255,0.1);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── VIEWS ── */
    .view { display: none; min-height: 100vh; }
    .view.active { display: block; }

    /* ── HEADER ── */
    .hdr {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: calc(var(--safe-top) + 10px) 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .hdr-title { font-size: 17px; font-weight: 600; letter-spacing: -0.4px; }
    .hdr-btn { font-size: 17px; color: var(--blue); background: none; border: none; cursor: pointer; font-family: inherit; min-width: 60px; }
    .hdr-btn:last-child { text-align: right; }

    /* ── CONTENT ── */
    .content { padding: 20px 16px; padding-bottom: calc(var(--safe-bottom) + 80px); }

    /* ── LABEL ── */
    .lbl { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text2); margin-bottom: 8px; }

    /* ── EQUIPMENT TOGGLES ── */
    .equip-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
    .equip-btn {
      padding: 8px 16px; border-radius: 20px;
      border: 2px solid var(--border);
      background: var(--card); color: var(--text2);
      font-size: 14px; font-weight: 500; font-family: inherit;
      cursor: pointer; transition: all 0.15s;
    }
    .equip-btn.on { border-color: var(--primary); background: var(--primary); color: #fff; }

    /* ── SESSION CARD ── */
    .sess-card {
      background: var(--card);
      border-radius: 16px;
      margin-bottom: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .sess-card:active { transform: scale(0.98); }
    .sess-card-top { padding: 16px 18px 10px; display: flex; align-items: center; gap: 14px; }
    .sess-icon {
      width: 52px; height: 52px; border-radius: 14px;
      background: var(--bg); font-size: 28px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sess-name { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
    .sess-meta { font-size: 13px; color: var(--text2); }
    .sess-tags { padding: 0 18px 10px; display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      font-size: 12px; padding: 3px 10px; border-radius: 20px;
      background: var(--bg); color: var(--text2); font-weight: 500;
    }
    .go-btn {
      display: block; width: calc(100% - 36px); margin: 0 18px 16px;
      border: none; border-radius: 10px; padding: 13px;
      font-size: 15px; font-weight: 600; font-family: inherit;
      cursor: pointer; color: #fff; text-align: center;
    }

    /* ── SESSION VIEW ── */
    .timer-wrap { background: var(--card); border-bottom: 1px solid var(--border); padding: 8px 0 6px; text-align: center; }
    .timer { font-size: 40px; font-weight: 200; letter-spacing: 3px; color: var(--primary); font-variant-numeric: tabular-nums; line-height: 1; }
    .prog-bar { height: 3px; background: var(--border); margin: 6px 16px 0; border-radius: 2px; overflow: hidden; }
    .prog-fill { height: 100%; background: var(--primary); transition: width 0.4s ease; border-radius: 2px; }
    .prog-txt { display: flex; justify-content: space-between; padding: 4px 16px 2px; font-size: 12px; color: var(--text2); }

    /* ── SECTION HEADER ── */
    .sec-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 4px 8px;
    }
    .sec-hdr .lbl { margin: 0; }
    .circuit-pill {
      font-size: 11px; font-weight: 700; letter-spacing: 0.4px;
      background: rgba(255,107,53,0.15); color: var(--primary);
      padding: 3px 9px; border-radius: 20px;
    }

    /* ── EXERCISE ITEM ── */
    .ex-card { background: var(--card); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; }
    .ex-item {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 14px; border-bottom: 1px solid var(--border);
      cursor: pointer; position: relative;
    }
    .ex-item:last-child { border-bottom: none; }

    .check {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.2s;
    }
    .check.done { background: var(--success); border-color: var(--success); }
    .check.done::after {
      content: '';
      width: 6px; height: 11px;
      border: 2.5px solid #fff;
      border-top: none; border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }

    .ex-body { flex: 1; min-width: 0; }
    .ex-name { font-size: 15px; font-weight: 500; transition: color 0.2s; }
    .ex-name.done { text-decoration: line-through; color: var(--text3); }
    .ex-detail { font-size: 13px; color: var(--text2); margin-top: 2px; }

    .edit-ico {
      font-size: 18px; color: var(--text3); background: none;
      border: none; cursor: pointer; padding: 4px; flex-shrink: 0;
      font-style: normal;
    }

    /* add exercise button */
    .add-ex-btn {
      width: 100%; padding: 13px 14px;
      display: flex; align-items: center; gap: 10px;
      border: none; background: none; font-family: inherit;
      color: var(--blue); font-size: 15px; font-weight: 500; cursor: pointer;
    }
    .add-ico {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--blue); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; line-height: 1; flex-shrink: 0;
    }

    /* ── BOTTOM BAR ── */
    .bottom-bar {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      padding: 10px 16px; padding-bottom: calc(var(--safe-bottom) + 10px);
      background: var(--bg); border-top: 1px solid var(--border);
      z-index: 200;
    }
    .btn-full {
      width: 100%; border: none; border-radius: 13px; padding: 16px;
      font-size: 17px; font-weight: 600; font-family: inherit;
      cursor: pointer; color: #fff;
    }
    .btn-primary { background: var(--primary); }
    .btn-blue { background: var(--blue); }
    .btn-danger { background: var(--danger); }
    .btn-ghost { background: var(--card); color: var(--text); }

    /* ── MODAL ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      z-index: 500; display: flex; align-items: flex-end; justify-content: center;
    }
    .modal {
      background: var(--card); border-radius: 20px 20px 0 0;
      padding: 20px 20px; padding-bottom: calc(var(--safe-bottom) + 16px);
      width: 100%; max-width: 430px;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-title { font-size: 17px; font-weight: 700; text-align: center; margin-bottom: 18px; }
    .modal input, .modal textarea {
      width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 12px 14px; font-size: 16px; font-family: inherit;
      background: var(--bg); color: var(--text); margin-bottom: 10px;
      -webkit-appearance: none; outline: none;
    }
    .modal input:focus, .modal textarea:focus { border-color: var(--blue); }
    .modal-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .modal-col { flex: 1; text-align: center; }
    .modal-col .lbl { margin-bottom: 6px; }
    .stepper { display: flex; align-items: center; justify-content: center; gap: 10px; }
    .step-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--bg); border: none;
      font-size: 22px; color: var(--blue); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .step-val { font-size: 26px; font-weight: 300; min-width: 50px; text-align: center; }
    .modal-actions { display: flex; gap: 8px; margin-top: 14px; }
    .btn-sm {
      flex: 1; border: none; border-radius: 11px; padding: 13px 8px;
      font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer;
    }
    .btn-sm.ghost { background: var(--bg); color: var(--text); }
    .btn-sm.blue { background: var(--blue); color: #fff; }
    .btn-sm.red { background: rgba(255,59,48,0.12); color: var(--danger); }

    /* ── COMPLETION ── */
    .completion {
      position: fixed; inset: 0; background: var(--bg);
      z-index: 1000; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px; text-align: center;
    }
    .comp-emoji { font-size: 80px; margin-bottom: 16px; }
    .comp-title { font-size: 30px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.5px; }
    .comp-sub { font-size: 17px; color: var(--text2); margin-bottom: 36px; }
    .comp-stats { display: flex; gap: 32px; margin-bottom: 48px; }
    .comp-stat-val { font-size: 38px; font-weight: 700; color: var(--primary); letter-spacing: -1px; }
    .comp-stat-lbl { font-size: 13px; color: var(--text2); margin-top: 2px; }

    /* ── HISTORY ── */
    .hist-item {
      background: var(--card); border-radius: var(--radius);
      padding: 14px 16px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 12px;
    }
    .hist-emoji { font-size: 26px; }
    .hist-body { flex: 1; }
    .hist-name { font-size: 15px; font-weight: 600; }
    .hist-meta { font-size: 13px; color: var(--text2); margin-top: 2px; }
    .hist-time { font-size: 15px; color: var(--text2); font-weight: 500; }

    /* ── EMPTY ── */
    .empty { text-align: center; padding: 70px 24px; color: var(--text2); }
    .empty-ico { font-size: 52px; margin-bottom: 12px; }
    .empty-txt { font-size: 15px; }

    /* ── MISC ── */
    .gap { height: 24px; }
    .sep { height: 1px; background: var(--border); margin: 2px 0; }
    hr.section-sep { border: none; height: 8px; background: var(--bg); margin: 0; }
  </style>
</head>
<body>

<!-- ────────────── HOME ────────────── -->
<div class="view active" id="v-home">
  <div class="hdr">
    <div class="hdr-title">Training 💪</div>
    <button class="hdr-btn" onclick="go('history')" style="text-align:right">Historique</button>
  </div>
  <div class="content">
    <div class="lbl">Équipement disponible</div>
    <div class="equip-row" id="equip-row">
      <button class="equip-btn" data-e="élastique" onclick="togEquip('élastique')">🔴 Élastique</button>
      <button class="equip-btn" data-e="haltères" onclick="togEquip('haltères')">🏋️ Haltères</button>
      <button class="equip-btn" data-e="banc" onclick="togEquip('banc')">🪑 Banc</button>
    </div>

    <div class="gap"></div>
    <div class="lbl">Séances</div>
    <div id="sess-list"></div>
  </div>
</div>

<!-- ────────────── SESSION ────────────── -->
<div class="view" id="v-session">
  <div class="hdr">
    <button class="hdr-btn" onclick="backFromSession()">← Retour</button>
    <div class="hdr-title" id="sess-title">Séance</div>
    <button class="hdr-btn" id="edit-mode-btn" onclick="togEditMode()">Modifier</button>
  </div>
  <div class="timer-wrap">
    <div class="timer" id="timer-txt">0:00</div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-txt">
      <span id="prog-txt">0 / 0 exercices</span>
      <span id="sess-dur-est"></span>
    </div>
  </div>
  <div class="content" id="sess-content" style="padding-top:12px;"></div>
  <div class="bottom-bar">
    <button class="btn-full btn-primary" onclick="finishSession()">Terminer la séance ✓</button>
  </div>
</div>

<!-- ────────────── HISTORY ────────────── -->
<div class="view" id="v-history">
  <div class="hdr">
    <button class="hdr-btn" onclick="go('home')">← Retour</button>
    <div class="hdr-title">Historique</div>
    <div style="width:60px"></div>
  </div>
  <div class="content" id="hist-content"></div>
</div>

<!-- ────────────── MODAL ────────────── -->
<div class="overlay" id="modal-overlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modal-inner" onclick="event.stopPropagation()"></div>
</div>

<!-- ────────────── COMPLETION ────────────── -->
<div class="completion" id="completion" style="display:none">
  <div class="comp-emoji">🎉</div>
  <div class="comp-title">Bravo !</div>
  <div class="comp-sub" id="comp-name">Séance terminée</div>
  <div class="comp-stats">
    <div>
      <div class="comp-stat-val" id="comp-time">0:00</div>
      <div class="comp-stat-lbl">Durée</div>
    </div>
    <div>
      <div class="comp-stat-val" id="comp-exs">0</div>
      <div class="comp-stat-lbl">Exercices</div>
    </div>
  </div>
  <button class="btn-full btn-primary" style="max-width:320px" onclick="closeCompletion()">Retour à l'accueil</button>
</div>

<script>
// ══════════════════════════════════════════════
// DEFAULT SESSIONS
// ══════════════════════════════════════════════
const DEFAULTS = [
  {
    id: 'A', name: 'Force Épaules & Triceps', emoji: '💪',
    equipment: ['élastique'], duration: '~15 min', color: '#FF6B35',
    sections: [
      { name: 'Échauffement', repeat: 1, exercises: [
        { id: 'aw1', name: 'Rotations épaules', sets: 1, reps: '16' },
        { id: 'aw2', name: 'Rotations buste', sets: 1, reps: '12' },
        { id: 'aw3', name: 'Jumping Jacks', sets: 1, reps: '20' },
        { id: 'aw4', name: 'Descentes + touché épaules', sets: 1, reps: '3' },
      ]},
      { name: 'Force', repeat: 1, exercises: [
        { id: 'aa1', name: 'Pompes serrées (sur genoux)', sets: 3, reps: '9' },
        { id: 'aa2', name: 'Développé épaules élastique', sets: 3, reps: '8' },
        { id: 'aa3', name: 'Élévations latérales 5lbs', sets: 3, reps: '12' },
        { id: 'aa4', name: 'Extensions triceps élastique', sets: 3, reps: '12' },
        { id: 'aa5', name: 'Gainage planche', sets: 2, reps: '40sec' },
      ]},
    ]
  },
  {
    id: 'B', name: 'Dos & Biceps', emoji: '🏋️',
    equipment: ['élastique'], duration: '~15 min', color: '#5856D6',
    sections: [
      { name: 'Exercices', repeat: 1, exercises: [
        { id: 'ba1', name: 'Rowing assis élastique', sets: 3, reps: '12' },
        { id: 'ba2', name: 'Rowing un bras élastique', sets: 3, reps: '15' },
        { id: 'ba3', name: 'Curl biceps élastique', sets: 3, reps: '12' },
        { id: 'ba4', name: 'Curl marteau élastique', sets: 3, reps: '12' },
        { id: 'ba5', name: 'Gainage planche', sets: 1, reps: '45sec' },
      ]},
    ]
  },
  {
    id: 'C', name: 'Circuit Cardio-Force', emoji: '🔥',
    equipment: ['élastique'], duration: '~20 min', color: '#30D158',
    sections: [
      { name: 'Échauffement', repeat: 1, exercises: [
        { id: 'cw1', name: 'Rotations épaules', sets: 1, reps: '16' },
        { id: 'cw2', name: 'Rotations buste', sets: 1, reps: '12' },
        { id: 'cw3', name: 'Jumping Jacks', sets: 1, reps: '20' },
        { id: 'cw4', name: 'Descentes + touché épaules', sets: 1, reps: '3' },
        { id: 'cw5', name: 'Touché main genoux', sets: 2, reps: '6' },
        { id: 'cw6', name: 'Touché main chevilles', sets: 2, reps: '8' },
      ]},
      { name: 'Circuit', repeat: 2, exercises: [
        { id: 'cc1', name: 'High knees', sets: 1, reps: '30 (30sec)' },
        { id: 'cc2', name: 'Mountain climbers / Crunchs', sets: 1, reps: '20' },
        { id: 'cc3', name: 'Squats', sets: 1, reps: '12' },
        { id: 'cc4', name: 'Bird latéral et devant', sets: 1, reps: '12' },
        { id: 'cc5', name: 'Rowing élastique', sets: 1, reps: '25+25' },
        { id: 'cc6', name: 'Curl + retour avant-bras', sets: 1, reps: '9' },
        { id: 'cc7', name: 'Pompes normales', sets: 1, reps: '6' },
      ]},
      { name: 'Finisher', repeat: 1, exercises: [
        { id: 'cf1', name: 'Gainage planche', sets: 1, reps: '45sec' },
      ]},
    ]
  }
];

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let S = {
  equipment: ['élastique'],
  sessions: [],
  history: [],
  // active session
  active: null, // { id, startTime, checked: Set }
  editMode: false,
  timerInterval: null,
  // modal temp
  _sets: 1, _reps: 12,
};

function load() {
  try {
    S.equipment = JSON.parse(localStorage.getItem('t_eq') || '["élastique"]');
    const raw = localStorage.getItem('t_sess');
    S.sessions = raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(DEFAULTS));
    S.history = JSON.parse(localStorage.getItem('t_hist') || '[]');
  } catch {
    S.sessions = JSON.parse(JSON.stringify(DEFAULTS));
    S.history = [];
  }
}

function save() {
  try {
    localStorage.setItem('t_eq', JSON.stringify(S.equipment));
    localStorage.setItem('t_sess', JSON.stringify(S.sessions));
    localStorage.setItem('t_hist', JSON.stringify(S.history));
  } catch {}
}

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════
function go(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('v-' + view).classList.add('active');
  if (view === 'home') renderHome();
  if (view === 'history') renderHistory();
}

// ══════════════════════════════════════════════
// HOME
// ══════════════════════════════════════════════
function renderHome() {
  // Equipment buttons
  document.querySelectorAll('.equip-btn').forEach(btn => {
    btn.classList.toggle('on', S.equipment.includes(btn.dataset.e));
  });

  const list = document.getElementById('sess-list');
  list.innerHTML = '';
  S.sessions.forEach(sess => {
    const d = document.createElement('div');
    d.className = 'sess-card';
    d.innerHTML = `
      <div class="sess-card-top">
        <div class="sess-icon">${sess.emoji}</div>
        <div style="flex:1">
          <div class="sess-name">${sess.name}</div>
          <div class="sess-meta">⏱ ${sess.duration}</div>
        </div>
      </div>
      <div class="sess-tags">
        ${sess.equipment.map(e => `<span class="tag">${e}</span>`).join('')}
      </div>
      <button class="go-btn" style="background:${sess.color}" onclick="startSession('${sess.id}')">
        Démarrer la séance →
      </button>
    `;
    list.appendChild(d);
  });
}

function togEquip(e) {
  S.equipment = S.equipment.includes(e)
    ? S.equipment.filter(x => x !== e)
    : [...S.equipment, e];
  save();
  renderHome();
}

// ══════════════════════════════════════════════
// SESSION
// ══════════════════════════════════════════════
function startSession(id) {
  const sess = S.sessions.find(s => s.id === id);
  if (!sess) return;
  S.active = { id, startTime: Date.now(), checked: new Set() };
  S.editMode = false;
  document.getElementById('sess-title').textContent = sess.name;
  document.getElementById('sess-dur-est').textContent = sess.duration;
  document.getElementById('edit-mode-btn').textContent = 'Modifier';
  startTimer();
  renderSession();
  go('session');
}

function startTimer() {
  if (S.timerInterval) clearInterval(S.timerInterval);
  S.timerInterval = setInterval(tickTimer, 1000);
  tickTimer();
}

function tickTimer() {
  if (!S.active) return;
  const secs = Math.floor((Date.now() - S.active.startTime) / 1000);
  document.getElementById('timer-txt').textContent =
    Math.floor(secs / 60) + ':' + String(secs % 60).padStart(2, '0');
}

function totalExs(sess) {
  return sess.sections.reduce((s, sec) => s + sec.exercises.length, 0);
}

function renderSession() {
  if (!S.active) return;
  const sess = S.sessions.find(s => s.id === S.active.id);
  if (!sess) return;

  const total = totalExs(sess);
  const done = S.active.checked.size;
  document.getElementById('prog-txt').textContent = `${done} / ${total} exercices`;
  document.getElementById('prog-fill').style.width = total ? `${done / total * 100}%` : '0%';

  const box = document.getElementById('sess-content');
  box.innerHTML = '';

  sess.sections.forEach((sec, si) => {
    // Section header
    const hdr = document.createElement('div');
    hdr.className = 'sec-hdr';
    hdr.innerHTML = `<div class="lbl">${sec.name}</div>` +
      (sec.repeat > 1 ? `<span class="circuit-pill">${sec.repeat}× circuit</span>` : '');
    box.appendChild(hdr);

    // Exercises card
    const card = document.createElement('div');
    card.className = 'ex-card';

    sec.exercises.forEach((ex, ei) => {
      const key = `${si}-${ei}`;
      const isDone = S.active.checked.has(key);

      const item = document.createElement('div');
      item.className = 'ex-item';
      item.onclick = () => toggleEx(key);

      const chk = document.createElement('div');
      chk.className = 'check' + (isDone ? ' done' : '');

      const body = document.createElement('div');
      body.className = 'ex-body';
      const nm = document.createElement('div');
      nm.className = 'ex-name' + (isDone ? ' done' : '');
      nm.textContent = ex.name;
      body.appendChild(nm);

      if (ex.reps) {
        const det = document.createElement('div');
        det.className = 'ex-detail';
        det.textContent = (ex.sets > 1 ? `${ex.sets} × ` : '') + ex.reps;
        body.appendChild(det);
      }

      const editBtn = document.createElement('i');
      editBtn.className = 'edit-ico';
      editBtn.textContent = '✎';
      editBtn.onclick = e => { e.stopPropagation(); openEditEx(si, ei); };

      item.appendChild(chk);
      item.appendChild(body);
      item.appendChild(editBtn);
      card.appendChild(item);
    });

    // Add exercise button (always visible for quick access)
    const addBtn = document.createElement('button');
    addBtn.className = 'add-ex-btn';
    addBtn.innerHTML = `<div class="add-ico">+</div> Ajouter un exercice`;
    addBtn.onclick = () => openAddEx(si);
    card.appendChild(addBtn);

    box.appendChild(card);
  });
}

function toggleEx(key) {
  if (S.active.checked.has(key)) S.active.checked.delete(key);
  else S.active.checked.add(key);
  renderSession();
}

function togEditMode() {
  S.editMode = !S.editMode;
  document.getElementById('edit-mode-btn').textContent = S.editMode ? 'Terminer' : 'Modifier';
  renderSession();
}

function backFromSession() {
  if (S.active && S.active.checked.size > 0) {
    if (!confirm('Abandonner la séance en cours ?')) return;
  }
  clearInterval(S.timerInterval);
  S.active = null;
  go('home');
}

function finishSession() {
  if (!S.active) return;
  const sess = S.sessions.find(s => s.id === S.active.id);
  const secs = Math.floor((Date.now() - S.active.startTime) / 1000);
  const timeStr = Math.floor(secs / 60) + ':' + String(secs % 60).padStart(2, '0');
  const done = S.active.checked.size;
  const total = totalExs(sess);

  S.history.unshift({
    sessionId: sess.id, name: sess.name, emoji: sess.emoji,
    date: new Date().toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' }),
    duration: timeStr, done, total,
  });
  save();

  clearInterval(S.timerInterval);
  S.active = null;

  document.getElementById('comp-name').textContent = sess.name;
  document.getElementById('comp-time').textContent = timeStr;
  document.getElementById('comp-exs').textContent = done;
  document.getElementById('completion').style.display = 'flex';
}

function closeCompletion() {
  document.getElementById('completion').style.display = 'none';
  go('home');
}

// ══════════════════════════════════════════════
// EDIT EXERCISE MODAL
// ══════════════════════════════════════════════
function openEditEx(si, ei) {
  const sess = S.sessions.find(s => s.id === S.active.id);
  const ex = sess.sections[si].exercises[ei];
  const repsNum = parseInt(ex.reps);
  S._sets = ex.sets || 1;
  S._reps = isNaN(repsNum) ? null : repsNum;
  S._repsStr = ex.reps;

  document.getElementById('modal-inner').innerHTML = `
    <div class="modal-title">Modifier l'exercice</div>
    <input id="me-name" type="text" value="${ex.name}" placeholder="Nom">

    <div class="modal-row">
      <div class="modal-col">
        <div class="lbl">Séries</div>
        <div class="stepper">
          <button class="step-btn" onclick="stepField('sets',-1)">−</button>
          <div class="step-val" id="me-sets-v">${S._sets}</div>
          <button class="step-btn" onclick="stepField('sets',1)">+</button>
        </div>
      </div>
      <div class="modal-col">
        <div class="lbl">Reps</div>
        <div class="stepper">
          <button class="step-btn" onclick="stepField('reps',-1)">−</button>
          <div class="step-val" id="me-reps-v">${S._reps !== null ? S._reps : '—'}</div>
          <button class="step-btn" onclick="stepField('reps',1)">+</button>
        </div>
      </div>
    </div>
    <input id="me-reps-txt" type="text" value="${ex.reps}" placeholder="ex: 12 ou 40sec">

    <div class="modal-actions">
      <button class="btn-sm red" onclick="delEx(${si},${ei})">Supprimer</button>
      <button class="btn-sm ghost" onclick="closeModal()">Annuler</button>
      <button class="btn-sm blue" onclick="saveEx(${si},${ei})">OK</button>
    </div>
  `;
  document.getElementById('modal-overlay').style.display = 'flex';
}

function openAddEx(si) {
  S._sets = 3; S._reps = 12;
  document.getElementById('modal-inner').innerHTML = `
    <div class="modal-title">Ajouter un exercice</div>
    <input id="me-name" type="text" placeholder="Nom de l'exercice">

    <div class="modal-row">
      <div class="modal-col">
        <div class="lbl">Séries</div>
        <div class="stepper">
          <button class="step-btn" onclick="stepField('sets',-1)">−</button>
          <div class="step-val" id="me-sets-v">3</div>
          <button class="step-btn" onclick="stepField('reps',1)">+</button>
        </div>
      </div>
      <div class="modal-col">
        <div class="lbl">Reps</div>
        <div class="stepper">
          <button class="step-btn" onclick="stepField('reps',-1)">−</button>
          <div class="step-val" id="me-reps-v">12</div>
          <button class="step-btn" onclick="stepField('reps',1)">+</button>
        </div>
      </div>
    </div>
    <input id="me-reps-txt" type="text" value="12" placeholder="ex: 12 ou 40sec">

    <div class="modal-actions">
      <button class="btn-sm ghost" onclick="closeModal()">Annuler</button>
      <button class="btn-sm blue" onclick="addEx(${si})">Ajouter</button>
    </div>
  `;
  document.getElementById('modal-overlay').style.display = 'flex';
}

function stepField(field, delta) {
  if (field === 'sets') {
    S._sets = Math.max(1, S._sets + delta);
    document.getElementById('me-sets-v').textContent = S._sets;
  } else {
    if (S._reps === null) return;
    S._reps = Math.max(1, S._reps + delta);
    document.getElementById('me-reps-v').textContent = S._reps;
    const inp = document.getElementById('me-reps-txt');
    if (inp) inp.value = S._reps;
  }
}

function saveEx(si, ei) {
  const sess = S.sessions.find(s => s.id === S.active.id);
  const ex = sess.sections[si].exercises[ei];
  ex.name = document.getElementById('me-name').value.trim() || ex.name;
  ex.reps = document.getElementById('me-reps-txt').value.trim() || ex.reps;
  ex.sets = S._sets;
  save(); closeModal(); renderSession();
}

function addEx(si) {
  const name = document.getElementById('me-name').value.trim();
  if (!name) { document.getElementById('me-name').focus(); return; }
  const reps = document.getElementById('me-reps-txt').value.trim() || String(S._reps);
  const sess = S.sessions.find(s => s.id === S.active.id);
  sess.sections[si].exercises.push({ id: 'ex' + Date.now(), name, sets: S._sets, reps });
  save(); closeModal(); renderSession();
}

function delEx(si, ei) {
  if (!confirm('Supprimer cet exercice ?')) return;
  const sess = S.sessions.find(s => s.id === S.active.id);
  sess.sections[si].exercises.splice(ei, 1);
  save(); closeModal(); renderSession();
}

function closeModal(evt) {
  if (evt && evt.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').style.display = 'none';
}

// ══════════════════════════════════════════════
// HISTORY
// ══════════════════════════════════════════════
function renderHistory() {
  const box = document.getElementById('hist-content');
  if (!S.history.length) {
    box.innerHTML = `<div class="empty"><div class="empty-ico">📋</div><div class="empty-txt">Aucune séance terminée pour l'instant.</div></div>`;
    return;
  }
  box.innerHTML = S.history.map(h => `
    <div class="hist-item">
      <div class="hist-emoji">${h.emoji}</div>
      <div class="hist-body">
        <div class="hist-name">${h.name}</div>
        <div class="hist-meta">${h.date} · ${h.done}/${h.total} exercices</div>
      </div>
      <div class="hist-time">⏱ ${h.duration}</div>
    </div>
  `).join('');
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
load();
renderHome();
</script>
</body>
</html>
